<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://showcases.yalco.kr/html-css/01-06/table.css">
  <title>Document</title>
</head>
<body>
  <p>
    <h1>필기내용</h1>
    tr-> table row <br>
    td-> table dataset <br>
    css로 컬럼에 공통적 속성을 넣어주고 싶을 때 컬럼값을 사용한다.
  </p>
  <table>
    
    <caption>1에서 9까지의 숫자들</caption>
    <tr>
      <td>1</td>
      <td>2</td>
      <td>3</td>
    </tr>
    <tr>
      <td>4</td>
      <td>5</td>
      <td>6</td>
    </tr>
    <tr>
      <td>7</td>
      <td>8</td>
      <td>9</td>
    </tr>
  </table>
  <table>
    <caption></caption>
    <thead>
      <tr>
        <th scope="col">과목</th>
        <th scope="col">월</th>
        <th scope="col">화</th>
        <th scope="col">수</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <th scope="row"></th>
        <td></td>
        <td></td>
        <td></td>
      </tr>
    </tbody>
    <tbody>
      <tr>
        <th scope="row"></th>
        <td></td>
        <td></td>
        <td></td>
      </tr>
    </tbody>
    <tbody>
      <tr>
        <th scope="row"></th>
        <td></td>
        <td></td>
        <td></td>
      </tr>
    </tbody>
    <tfoot>
      <tr>
        <th scope="row"></th>
        <td></td>
        <td></td>
        <td></td>
      </tr>
    </tfoot>
  </table>
  <table>
    <tr>
      <td>1</td>
      <td colspan="2">2</td>

      <td>1</td>
    </tr>
    <tr>
      <td rowspan="3">3</td>
      <td>1</td>
      <td>1</td>
      <td>1</td>
    </tr>
    <tr>
      
      <td>1</td>
      <td colspan="2" rowspan="2">4</td>
    </tr>
    <tr>
      
      <td>1</td>
      
    </tr>
  </table>
  <table>
    <colgroup>
      <col class="weekend">
      <col span="5">
      <col class="weekend">
    </colgroup>
    <caption></caption>
    <thead>
      <tr>
        <th>일</th>
        <th>월</th>
        <th>화</th>
        <th>수</th>
        <th>목</th>
        <th>금</th>
        <th>토</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <th>-</th>
        <td>'-''</td>
        <td>'-''</td>
        <td>'-''</td>
        <td>'-''</td>
        <td>'-''</td>
        <th>-</th>
      </tr>
      <tr>
        <th>-</th>
        <td>'-''</td>
        <td>'-''</td>
        <td>'-''</td>
        <td>'-''</td>
        <td>'-''</td>
        <th>-</th>
      </tr>
      <tr>
        <th>-</th>
        <td>'-''</td>
        <td>'-''</td>
        <td>'-''</td>
        <td>'-''</td>
        <td>'-''</td>
        <th>-</th>
      </tr>
      <tr>
        <th>-</th>
        <td>'-''</td>
        <td>'-''</td>
        <td>'-''</td>
        <td>'-''</td>
        <td>'-''</td>
        <th>-</th>
      </tr>
    </tbody>
  </table>
</body>
</html>
