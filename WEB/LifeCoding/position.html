<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>position</title>
        <style>
            * {
                box-sizing: border-box;
            }
            html {
                border: 1px solid black;
                height: 5000000px;
            }
            div {
                border: 5px solid tomato;
                margin: 10px;
            }
            #me {
                /* position: relative; */
                position: fixed;
                /* 포지션을 앱솔루트로 지정할경우  */
                /* right: cm; */
                left: 0cm;
                top: 0cm;
                /* right 보다 left가, bottom보다 top이 우선순위이다. 이는 순서에 상관이 없다. */

                /* 같은 속성으로 두개의 서로 다른 오프셋을 설정하면 뒤에 있는 속성이 우선순위이다. */
            }
        </style>
    </head>
    <body>
        <!-- <div id="grand">
            grand -->
        <div id="other">other</div>
        <div id="parent">
            parent
            <div id="me">me</div>
            <!-- </div> -->
        </div>
    </body>
</html>
